services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: seki
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - seki-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seki -d seki"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  seki:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${SEKI_PORT:-8080}:8080"
    volumes:
      - ./seki.yaml:/app/seki.yaml:ro
      - seki-keys:/app/keys
      - seki-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seki-net
    environment:
      - SEKI_CONFIG=/app/seki.yaml
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
  seki-keys:
  seki-data:

networks:
  seki-net:
    driver: bridge
