  <rect x="232" y="432" width="692" height="36" fill="white"/>
  <text x="252" y="455" font-family="monospace" font-size="11" fill="#374151">2026-03-24 18:47:08</text>
  <rect x="420" y="442" width="110" height="20" rx="4" fill="#e0e7ff"/>
  <text x="432" y="456" font-family="-apple-system, sans-serif" font-size="11" fill="#3730a3">org.member.added</text>
