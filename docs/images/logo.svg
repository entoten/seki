<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Gate icon (torii-inspired) -->
  <g transform="translate(16, 12)">
    <!-- Top beam -->
    <rect x="0" y="16" width="80" height="10" rx="3" fill="url(#gate)"/>
    <!-- Second beam -->
    <rect x="8" y="32" width="64" height="6" rx="2" fill="url(#accent)"/>
    <!-- Left pillar -->
    <rect x="12" y="32" width="10" height="64" rx="2" fill="url(#gate)"/>
    <!-- Right pillar -->
    <rect x="58" y="32" width="10" height="64" rx="2" fill="url(#gate)"/>
    <!-- Key hole -->
    <circle cx="40" cy="58" r="10" fill="#818cf8" opacity="0.3"/>
    <circle cx="40" cy="58" r="6" fill="white"/>
    <rect x="38" y="58" width="4" height="14" rx="1" fill="white"/>
  </g>
  <!-- seki text -->
  <text x="116" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="700" fill="#1e1b4b" letter-spacing="-2">seki</text>
  <!-- Tagline -->
  <text x="118" y="102" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#6b7280">Authentication infrastructure that respects your time.</text>
</svg>
