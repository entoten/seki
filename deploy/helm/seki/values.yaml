replicaCount: 1

image:
  repository: ghcr.io/entoten/seki
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: auth.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  server:
    issuer: "https://auth.example.com"
  database:
    driver: postgres
    dsn: "postgres://seki:secret@seki-postgresql:5432/seki?sslmode=disable"
  signing:
    algorithm: EdDSA
  authentication:
    passkey:
      enabled: true
      rp_name: "seki"
      rp_id: "auth.example.com"
    totp:
      enabled: true

postgresql:
  enabled: true
  auth:
    database: seki
    username: seki
    password: secret

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
