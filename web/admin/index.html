<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seki admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header { background: #1e293b; color: #fff; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
.header-logo span { color: #60a5fa; }
.api-key-group { display: flex; align-items: center; gap: 0.5rem; }
.api-key-group label { font-size: 0.8rem; color: #94a3b8; }
.api-key-group input { background: #334155; border: 1px solid #475569; color: #e2e8f0; border-radius: 4px; padding: 0.3rem 0.6rem; font-size: 0.8rem; width: 220px; }

/* Layout */
.layout { display: flex; flex: 1; min-height: 0; }
.sidebar { width: 200px; background: #fff; border-right: 1px solid #e2e8f0; padding: 1rem 0; flex-shrink: 0; }
.sidebar a { display: block; padding: 0.6rem 1.5rem; color: #475569; font-size: 0.9rem; text-decoration: none; }
.sidebar a:hover, .sidebar a.active { background: #f1f5f9; color: #1e293b; font-weight: 600; }
.main { flex: 1; padding: 1.5rem; overflow-y: auto; max-width: 1100px; }

/* Cards & tables */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.25rem; }
.stat-card .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }

table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
th, td { text-align: left; padding: 0.65rem 1rem; font-size: 0.875rem; }
th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; }
tr:nth-child(even) td { background: #f8fafc; }
tr:hover td { background: #f1f5f9; }
td { border-bottom: 1px solid #f1f5f9; }
.clickable { cursor: pointer; }

.section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; }
.toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 1rem; font-size: 0.85rem; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; color: #334155; cursor: pointer; }
.btn:hover { background: #f1f5f9; }
.btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.btn-primary:hover { background: #1d4ed8; }
.btn-danger { background: #ef4444; color: #fff; border-color: #ef4444; }
.btn-danger:hover { background: #dc2626; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Forms */
select, input[type="text"], input[type="email"] { padding: 0.45rem 0.7rem; font-size: 0.85rem; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 8px; padding: 1.5rem; width: 90%; max-width: 440px; }
.modal h3 { margin-bottom: 1rem; }
.modal .field { margin-bottom: 0.75rem; }
.modal .field label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 0.25rem; }
.modal .field input { width: 100%; }
.modal .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

/* Badges */
.badge { display: inline-block; padding: 0.15rem 0.5rem; font-size: 0.75rem; border-radius: 9999px; font-weight: 600; }
.badge-green { background: #dcfce7; color: #166534; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gray { background: #f1f5f9; color: #475569; }

/* Detail */
.detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 0.4rem 1rem; background: #fff; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 1rem; }
.detail-grid dt { font-size: 0.8rem; color: #64748b; font-weight: 600; }
.detail-grid dd { font-size: 0.875rem; }

/* Loading / error */
.loading { text-align: center; padding: 2rem; color: #94a3b8; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.85rem; }
.empty { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.9rem; }

/* Pagination */
.pagination { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

/* Responsive */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .header { padding: 0 0.75rem; }
  .main { padding: 1rem; }
  .api-key-group input { width: 140px; }
}
</style>
</head>
<body>
<header class="header">
  <div class="header-logo"><span>seki</span> admin</div>
  <div class="api-key-group">
    <label>API Key</label>
    <input type="text" id="apiKeyInput" placeholder="Bearer token..." />
  </div>
</header>
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <a href="#dashboard">Dashboard</a>
    <a href="#users">Users</a>
    <a href="#orgs">Organizations</a>
    <a href="#audit">Audit Logs</a>
  </nav>
  <main class="main" id="content">
    <div class="loading">Loading...</div>
  </main>
</div>
<script>
(function() {
  'use strict';

  // --- State ---
  const state = { page: 'dashboard' };

  // --- API helpers ---
  function apiKey() { return document.getElementById('apiKeyInput').value.trim(); }

  function apiHeaders() {
    const h = { 'Content-Type': 'application/json' };
    const k = apiKey();
    if (k) h['Authorization'] = k.startsWith('Bearer ') ? k : 'Bearer ' + k;
    return h;
  }

  async function apiFetch(path, opts) {
    const res = await fetch(path, Object.assign({ headers: apiHeaders() }, opts || {}));
    if (!res.ok) {
      let msg = res.statusText;
      try { const b = await res.json(); msg = b.detail || b.title || msg; } catch(_) {}
      throw new Error(msg);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  // --- Render helpers ---
  const $ = (sel) => document.querySelector(sel);
  const content = () => $('#content');

  function h(tag, attrs, ...children) {
    const el = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else el.setAttribute(k, v);
    });
    children.flat().forEach(c => {
      if (c == null) return;
      el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
    return el;
  }

  function fmtDate(s) {
    if (!s) return '-';
    const d = new Date(s);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function showError(msg) {
    const el = h('div', { className: 'error-msg' }, msg);
    content().prepend(el);
    setTimeout(() => el.remove(), 6000);
  }

  function renderLoading() { content().innerHTML = '<div class="loading">Loading...</div>'; }

  function showModal(title, fields, onSubmit) {
    const overlay = h('div', { className: 'modal-overlay' });
    const modal = h('div', { className: 'modal' });
    modal.appendChild(h('h3', null, title));
    const inputs = {};
    fields.forEach(f => {
      const inp = h('input', { type: f.type || 'text', placeholder: f.placeholder || '' });
      if (f.value) inp.value = f.value;
      inputs[f.name] = inp;
      modal.appendChild(h('div', { className: 'field' }, h('label', null, f.label), inp));
    });
    const actions = h('div', { className: 'actions' });
    actions.appendChild(h('button', { className: 'btn', onClick: () => overlay.remove() }, 'Cancel'));
    actions.appendChild(h('button', { className: 'btn btn-primary', onClick: async () => {
      const vals = {};
      Object.entries(inputs).forEach(([k, inp]) => vals[k] = inp.value.trim());
      try { await onSubmit(vals); overlay.remove(); } catch (e) { showError(e.message); }
    }}, 'Save'));
    modal.appendChild(actions);
    overlay.appendChild(modal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }

  // --- Pages ---

  async function renderDashboard() {
    renderLoading();
    try {
      const [users, orgs, audit] = await Promise.all([
        apiFetch('/api/v1/users?limit=1'),
        apiFetch('/api/v1/orgs?limit=1'),
        apiFetch('/api/v1/audit-logs?limit=10'),
      ]);

      const c = content();
      c.innerHTML = '';
      c.appendChild(h('h2', { className: 'section-title' }, 'Dashboard'));

      const stats = h('div', { className: 'stats' });
      [
        { label: 'Users', value: users.data ? users.data.length + (users.next_cursor ? '+' : '') : '0' },
        { label: 'Organizations', value: orgs.data ? orgs.data.length + (orgs.next_cursor ? '+' : '') : '0' },
        { label: 'Recent Events', value: String(audit.data ? audit.data.length : 0) },
      ].forEach(s => {
        stats.appendChild(h('div', { className: 'stat-card' },
          h('div', { className: 'label' }, s.label),
          h('div', { className: 'value' }, s.value),
        ));
      });
      c.appendChild(stats);

      c.appendChild(h('h3', { className: 'section-title' }, 'Recent Audit Logs'));
      if (!audit.data || audit.data.length === 0) {
        c.appendChild(h('div', { className: 'empty' }, 'No audit log entries yet.'));
      } else {
        const tbl = h('table', null,
          h('thead', null, h('tr', null,
            h('th', null, 'Timestamp'), h('th', null, 'Action'), h('th', null, 'Actor'), h('th', null, 'Resource'),
          )),
          h('tbody', null, ...audit.data.map(e =>
            h('tr', null,
              h('td', null, fmtDate(e.timestamp)),
              h('td', null, h('span', { className: 'badge badge-gray' }, e.action || '-')),
              h('td', null, e.actor_id || '-'),
              h('td', null, (e.resource_type || '') + (e.resource_id ? '/' + e.resource_id : '')),
            )
          ))
        );
        c.appendChild(tbl);
      }
    } catch (e) {
      content().innerHTML = '';
      showError('Failed to load dashboard: ' + e.message);
    }
  }

  // --- Users ---
  async function renderUsers(cursor) {
    renderLoading();
    try {
      let url = '/api/v1/users?limit=20';
      if (cursor) url += '&cursor=' + encodeURIComponent(cursor);
      const res = await apiFetch(url);

      const c = content();
      c.innerHTML = '';

      const toolbar = h('div', { className: 'toolbar' });
      toolbar.appendChild(h('h2', { className: 'section-title' }, 'Users'));
      toolbar.appendChild(h('button', { className: 'btn btn-primary', onClick: () => {
        showModal('Create User', [
          { name: 'email', label: 'Email', type: 'email', placeholder: 'user@example.com' },
          { name: 'name', label: 'Display Name', placeholder: 'Jane Doe' },
        ], async (vals) => {
          await apiFetch('/api/v1/users', { method: 'POST', body: JSON.stringify({ email: vals.email, name: vals.name }) });
          renderUsers();
        });
      }}, '+ Create User'));
      c.appendChild(toolbar);

      if (!res.data || res.data.length === 0) {
        c.appendChild(h('div', { className: 'empty' }, 'No users found.'));
        return;
      }

      const tbl = h('table', null,
        h('thead', null, h('tr', null,
          h('th', null, 'Email'), h('th', null, 'Name'), h('th', null, 'Verified'), h('th', null, 'Created'),
        )),
        h('tbody', null, ...res.data.map(u =>
          h('tr', { className: 'clickable', onClick: () => renderUserDetail(u.id) },
            h('td', null, u.email || '-'),
            h('td', null, u.name || '-'),
            h('td', null, h('span', { className: u.email_verified ? 'badge badge-green' : 'badge badge-red' }, u.email_verified ? 'Yes' : 'No')),
            h('td', null, fmtDate(u.created_at)),
          )
        ))
      );
      c.appendChild(tbl);

      const pag = h('div', { className: 'pagination' });
      if (cursor) pag.appendChild(h('button', { className: 'btn', onClick: () => renderUsers() }, 'First'));
      if (res.next_cursor) pag.appendChild(h('button', { className: 'btn', onClick: () => renderUsers(res.next_cursor) }, 'Next'));
      if (pag.childNodes.length) c.appendChild(pag);
    } catch (e) {
      content().innerHTML = '';
      showError('Failed to load users: ' + e.message);
    }
  }

  async function renderUserDetail(id) {
    renderLoading();
    try {
      const u = await apiFetch('/api/v1/users/' + encodeURIComponent(id));
      const c = content();
      c.innerHTML = '';

      const toolbar = h('div', { className: 'toolbar' });
      toolbar.appendChild(h('button', { className: 'btn', onClick: () => renderUsers() }, 'Back to Users'));
      toolbar.appendChild(h('button', { className: 'btn', onClick: () => {
        showModal('Edit User', [
          { name: 'email', label: 'Email', type: 'email', value: u.email || '' },
          { name: 'name', label: 'Display Name', value: u.name || '' },
        ], async (vals) => {
          const body = {};
          if (vals.email && vals.email !== u.email) body.email = vals.email;
          if (vals.name !== u.name) body.name = vals.name;
          await apiFetch('/api/v1/users/' + encodeURIComponent(id), { method: 'PATCH', body: JSON.stringify(body) });
          renderUserDetail(id);
        });
      }}, 'Edit'));
      toolbar.appendChild(h('button', { className: 'btn btn-danger', onClick: async () => {
        if (!confirm('Delete this user?')) return;
        await apiFetch('/api/v1/users/' + encodeURIComponent(id), { method: 'DELETE' });
        renderUsers();
      }}, 'Delete'));
      c.appendChild(toolbar);

      c.appendChild(h('h2', { className: 'section-title' }, u.name || u.email));
      const dl = h('dl', { className: 'detail-grid' });
      [
        ['ID', u.id], ['Email', u.email], ['Name', u.name || '-'],
        ['Verified', u.email_verified ? 'Yes' : 'No'],
        ['Created', fmtDate(u.created_at)], ['Updated', fmtDate(u.updated_at)],
      ].forEach(([k, v]) => { dl.appendChild(h('dt', null, k)); dl.appendChild(h('dd', null, v || '-')); });
      c.appendChild(dl);

      if (u.metadata && Object.keys(u.metadata).length) {
        c.appendChild(h('h3', { className: 'section-title' }, 'Metadata'));
        const pre = h('pre', { style: 'background:#f8fafc;padding:1rem;border-radius:6px;font-size:0.8rem;overflow-x:auto;' });
        pre.textContent = JSON.stringify(u.metadata, null, 2);
        c.appendChild(pre);
      }
    } catch (e) {
      content().innerHTML = '';
      showError('Failed to load user: ' + e.message);
    }
  }

  // --- Organizations ---
  async function renderOrgs(cursor) {
    renderLoading();
    try {
      let url = '/api/v1/orgs?limit=20';
      if (cursor) url += '&cursor=' + encodeURIComponent(cursor);
      const res = await apiFetch(url);

      const c = content();
      c.innerHTML = '';
      c.appendChild(h('h2', { className: 'section-title' }, 'Organizations'));

      if (!res.data || res.data.length === 0) {
        c.appendChild(h('div', { className: 'empty' }, 'No organizations found.'));
        return;
      }

      const tbl = h('table', null,
        h('thead', null, h('tr', null,
          h('th', null, 'Slug'), h('th', null, 'Name'), h('th', null, 'Domains'), h('th', null, 'Created'),
        )),
        h('tbody', null, ...res.data.map(o =>
          h('tr', { className: 'clickable', onClick: () => renderOrgDetail(o.slug) },
            h('td', null, o.slug),
            h('td', null, o.name || '-'),
            h('td', null, (o.domains || []).join(', ') || '-'),
            h('td', null, fmtDate(o.created_at)),
          )
        ))
      );
      c.appendChild(tbl);

      const pag = h('div', { className: 'pagination' });
      if (cursor) pag.appendChild(h('button', { className: 'btn', onClick: () => renderOrgs() }, 'First'));
      if (res.next_cursor) pag.appendChild(h('button', { className: 'btn', onClick: () => renderOrgs(res.next_cursor) }, 'Next'));
      if (pag.childNodes.length) c.appendChild(pag);
    } catch (e) {
      content().innerHTML = '';
      showError('Failed to load organizations: ' + e.message);
    }
  }

  async function renderOrgDetail(slug) {
    renderLoading();
    try {
      const [org, members, roles] = await Promise.all([
        apiFetch('/api/v1/orgs/' + encodeURIComponent(slug)),
        apiFetch('/api/v1/orgs/' + encodeURIComponent(slug) + '/members?limit=50'),
        apiFetch('/api/v1/orgs/' + encodeURIComponent(slug) + '/roles'),
      ]);

      const c = content();
      c.innerHTML = '';
      c.appendChild(h('div', { className: 'toolbar' },
        h('button', { className: 'btn', onClick: () => renderOrgs() }, 'Back to Organizations'),
      ));

      c.appendChild(h('h2', { className: 'section-title' }, org.name || org.slug));
      const dl = h('dl', { className: 'detail-grid' });
      [
        ['ID', org.id], ['Slug', org.slug], ['Name', org.name || '-'],
        ['Domains', (org.domains || []).join(', ') || '-'],
        ['Created', fmtDate(org.created_at)], ['Updated', fmtDate(org.updated_at)],
      ].forEach(([k, v]) => { dl.appendChild(h('dt', null, k)); dl.appendChild(h('dd', null, v || '-')); });
      c.appendChild(dl);

      // Members
      c.appendChild(h('h3', { className: 'section-title' }, 'Members'));
      const membersData = Array.isArray(members) ? members : (members.data || []);
      if (membersData.length === 0) {
        c.appendChild(h('div', { className: 'empty' }, 'No members.'));
      } else {
        c.appendChild(h('table', null,
          h('thead', null, h('tr', null, h('th', null, 'User ID'), h('th', null, 'Role'), h('th', null, 'Joined'))),
          h('tbody', null, ...membersData.map(m =>
            h('tr', null,
              h('td', null, m.user_id), h('td', null, h('span', { className: 'badge badge-gray' }, m.role || '-')),
              h('td', null, fmtDate(m.joined_at)),
            )
          ))
        ));
      }

      // Roles
      c.appendChild(h('h3', { className: 'section-title', style: 'margin-top:1rem;' }, 'Roles'));
      const rolesData = Array.isArray(roles) ? roles : (roles.data || []);
      if (rolesData.length === 0) {
        c.appendChild(h('div', { className: 'empty' }, 'No roles defined.'));
      } else {
        c.appendChild(h('table', null,
          h('thead', null, h('tr', null, h('th', null, 'Name'), h('th', null, 'Permissions'))),
          h('tbody', null, ...rolesData.map(r =>
            h('tr', null,
              h('td', null, r.name), h('td', null, (r.permissions || []).join(', ') || '-'),
            )
          ))
        ));
      }
    } catch (e) {
      content().innerHTML = '';
      showError('Failed to load organization: ' + e.message);
    }
  }

  // --- Audit Logs ---
  async function renderAudit(cursor, actionFilter) {
    renderLoading();
    try {
      let url = '/api/v1/audit-logs?limit=25';
      if (cursor) url += '&cursor=' + encodeURIComponent(cursor);
      if (actionFilter) url += '&action=' + encodeURIComponent(actionFilter);
      const res = await apiFetch(url);

      const c = content();
      c.innerHTML = '';

      const toolbar = h('div', { className: 'toolbar' });
      toolbar.appendChild(h('h2', { className: 'section-title' }, 'Audit Logs'));
      const filterInput = h('input', { type: 'text', placeholder: 'Filter by action...', value: actionFilter || '' });
      const filterBtn = h('button', { className: 'btn', onClick: () => renderAudit(null, filterInput.value.trim()) }, 'Filter');
      if (actionFilter) toolbar.appendChild(h('button', { className: 'btn', onClick: () => renderAudit() }, 'Clear'));
      toolbar.appendChild(filterInput);
      toolbar.appendChild(filterBtn);
      c.appendChild(toolbar);

      if (!res.data || res.data.length === 0) {
        c.appendChild(h('div', { className: 'empty' }, 'No audit log entries found.'));
        return;
      }

      const tbl = h('table', null,
        h('thead', null, h('tr', null,
          h('th', null, 'Timestamp'), h('th', null, 'Action'), h('th', null, 'Actor'), h('th', null, 'Resource Type'), h('th', null, 'Resource ID'),
        )),
        h('tbody', null, ...res.data.map(e =>
          h('tr', null,
            h('td', null, fmtDate(e.timestamp)),
            h('td', null, h('span', { className: 'badge badge-gray' }, e.action || '-')),
            h('td', null, e.actor_id || '-'),
            h('td', null, e.resource_type || '-'),
            h('td', null, e.resource_id || '-'),
          )
        ))
      );
      c.appendChild(tbl);

      const pag = h('div', { className: 'pagination' });
      if (cursor) pag.appendChild(h('button', { className: 'btn', onClick: () => renderAudit(null, actionFilter) }, 'First'));
      if (res.next_cursor) pag.appendChild(h('button', { className: 'btn', onClick: () => renderAudit(res.next_cursor, actionFilter) }, 'Next'));
      if (pag.childNodes.length) c.appendChild(pag);
    } catch (e) {
      content().innerHTML = '';
      showError('Failed to load audit logs: ' + e.message);
    }
  }

  // --- Router ---
  function route() {
    const hash = location.hash.replace('#', '') || 'dashboard';
    const page = hash.split('/')[0];
    state.page = page;

    // Highlight active nav link
    document.querySelectorAll('.sidebar a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + page);
    });

    switch (page) {
      case 'dashboard': renderDashboard(); break;
      case 'users': renderUsers(); break;
      case 'orgs': renderOrgs(); break;
      case 'audit': renderAudit(); break;
      default: renderDashboard(); break;
    }
  }

  // --- Init ---
  const savedKey = localStorage.getItem('seki_api_key');
  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
  document.getElementById('apiKeyInput').addEventListener('input', function() {
    localStorage.setItem('seki_api_key', this.value);
  });

  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
