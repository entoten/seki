<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Additional Verification Required — {{.Issuer}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .card .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.25rem 0;
            color: #999;
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #e5e5e5;
        }
        .divider::before { margin-right: 0.75rem; }
        .divider::after { margin-left: 0.75rem; }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.625rem;
            border: none;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 0.5rem;
            transition: background 0.15s;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
            border: 1px solid #d1d5db;
        }
        .btn-secondary:hover { background: #e5e7eb; }
        .section { margin-bottom: 0.5rem; }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #999;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Additional Verification Required</h1>
        <div class="subtitle">Please complete a second factor to continue.</div>

        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        {{if .TOTPEnabled}}
        <div class="section">
            <form method="POST" action="/mfa">
                {{range $k, $v := .OIDCParams}}
                <input type="hidden" name="{{$k}}" value="{{$v}}">
                {{end}}
                <input type="hidden" name="mfa_method" value="totp">
                <label for="totp_code">Authenticator Code</label>
                <input type="text" id="totp_code" name="totp_code" required autocomplete="one-time-code" placeholder="123456" maxlength="6" pattern="[0-9]{6}" inputmode="numeric">
                <button type="submit" class="btn btn-primary">Verify Code</button>
            </form>
        </div>
        {{end}}

        {{if .PasskeyEnabled}}
        {{if .TOTPEnabled}}<div class="divider">or</div>{{end}}
        <div class="section">
            <form method="POST" action="/mfa">
                {{range $k, $v := .OIDCParams}}
                <input type="hidden" name="{{$k}}" value="{{$v}}">
                {{end}}
                <input type="hidden" name="mfa_method" value="passkey">
                <button type="submit" class="btn btn-secondary">Verify with Passkey</button>
            </form>
        </div>
        {{end}}

        <div class="footer">Powered by Seki</div>
    </div>
</body>
</html>
