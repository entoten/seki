run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - exhaustive
    - nilerr
    - prealloc

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/entoten/seki
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-dirs:
    - web
    - vendor
